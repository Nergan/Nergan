name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} 
          user: Nergan
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_ignored: private                # ← исключает приватные репозитории из языковой статистики
          repositories_skipped: private                     # ← глобально исключает приватные репозитории (влияет и на другие плагины)
          output_action: commit
          commit: yes
          filename: github-metrics.svg
