name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nergan
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage
          output_action: yes
          commit: yes
          filename: github-metrics.svg
          commit_message: "chore: update language stats"
